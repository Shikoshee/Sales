<style>
.pwa-install-btn {
  display: none; /* shown automatically when browser fires beforeinstallprompt */
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, #2563eb, #1d4ed8);
  color: white;
  border: none;
  padding: 14px 28px;
  border-radius: 50px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 8px 24px rgba(37,99,235,0.45);
  z-index: 9999;
  white-space: nowrap;
  animation: bounce-in 0.4s ease;
}

.pwa-install-btn:hover {
  transform: translateX(-50%) translateY(-2px);
  box-shadow: 0 12px 28px rgba(37,99,235,0.55);
}

.pwa-install-btn .install-icon { font-size: 20px; }

.pwa-dismiss {
  background: transparent;
  border: none;
  color: rgba(255,255,255,0.7);
  font-size: 18px;
  cursor: pointer;
  padding: 0 0 0 8px;
  line-height: 1;
}

.pwa-dismiss:hover { color: white; }

@keyframes bounce-in {
  0%   { opacity:0; transform:translateX(-50%) translateY(20px); }
  100% { opacity:1; transform:translateX(-50%) translateY(0); }
}
</style>

<!-- Install Button -->
<button class="pwa-install-btn" onclick="installApp()">
  <span class="install-icon">📲</span>
  Install Inventra App
  <span class="pwa-dismiss" onclick="dismissInstall(event)" title="Dismiss">✕</span>
</button>

<script>
async function installApp() {
  if (!window._installPrompt) {
    // iOS Safari — no prompt API, show manual instructions
    alert(
      "To install on iPhone/iPad:\n\n" +
      "1. Tap the Share button (box with arrow) at the bottom\n" +
      "2. Scroll down and tap 'Add to Home Screen'\n" +
      "3. Tap 'Add' — Inventra will appear on your home screen!"
    );
    return;
  }

  // Android / Windows / Mac — trigger native install prompt
  window._installPrompt.prompt();
  const { outcome } = await window._installPrompt.userChoice;

  if (outcome === "accepted") {
    console.log("✅ User installed Inventra");
    window._installPrompt = null;
    document.querySelectorAll(".pwa-install-btn").forEach(b => b.style.display = "none");
  }
}

function dismissInstall(e) {
  e.stopPropagation();
  document.querySelectorAll(".pwa-install-btn").forEach(b => b.style.display = "none");
}
</script>
