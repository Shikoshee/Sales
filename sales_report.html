function filterSales(){

  const search =
    document.getElementById("searchInput")
    .value
    .toLowerCase();

  const payment =
    document.getElementById("paymentFilter")
    .value;

  const status =
    document.getElementById("statusFilter")
    .value;

  const date =
    document.getElementById("dateFilter")
    .value;

  const filtered = allSales.filter(sale => {

    const matchesSearch =

      sale.product?.toLowerCase().includes(search)

      ||

      sale.customer?.toLowerCase().includes(search);

    const matchesPayment =
      !payment || sale.payment === payment;

    const matchesStatus =
      !status || sale.status === status;

    const matchesDate =
      !date ||
      new Date(sale.date)
      .toISOString()
      .split("T")[0] === date;

    return (
      matchesSearch &&
      matchesPayment &&
      matchesStatus &&
      matchesDate
    );

  });

  renderSales(filtered);

  updateSummary(filtered);

}

async function markAsPaid(index){

  // Re-derive the filtered list the same way renderSales does,
  // so the button index always maps to the right row
  const search =
    document.getElementById("searchInput").value.toLowerCase();
  const payment =
    document.getElementById("paymentFilter").value;
  const status =
    document.getElementById("statusFilter").value;
  const date =
    document.getElementById("dateFilter").value;

  const filtered = allSales.filter(sale => {
    const matchesSearch =
      sale.product?.toLowerCase().includes(search) ||
      sale.customer?.toLowerCase().includes(search);
    const matchesPayment = !payment || sale.payment === payment;
    const matchesStatus  = !status  || sale.status  === status;
    const matchesDate    = !date    ||
      new Date(sale.date).toISOString().split("T")[0] === date;
    return matchesSearch && matchesPayment && matchesStatus && matchesDate;
  });

  const sale = filtered[index];
  if(!sale) return;

  // Find the real record in allSales
  const originalIndex = allSales.findIndex(s =>
    s.product === sale.product &&
    s.date    === sale.date &&
    s.debtor  === sale.debtor
  );
  if(originalIndex === -1) return;

  const currentSale = allSales[originalIndex];

  const remainingBalance = parseFloat(currentSale.balance) || 0;

  if(remainingBalance <= 0){
    alert("No outstanding balance.");
    return;
  }

  const paymentInput = prompt(
    `Outstanding balance is Ksh ${remainingBalance}\n\nEnter amount paid:`
  );

  if(paymentInput === null) return;

  const paymentAmount = parseFloat(paymentInput);

  if(isNaN(paymentAmount) || paymentAmount <= 0){
    alert("Enter a valid payment amount.");
    return;
  }

  if(paymentAmount > remainingBalance){
    alert("Payment cannot exceed balance.");
    return;
  }

  const today    = new Date().toISOString().split("T")[0];
  const saleDate = new Date(currentSale.date).toISOString().split("T")[0];

  // Update the record
  currentSale.amountPaid =
    (parseFloat(currentSale.amountPaid) || 0) + paymentAmount;

  currentSale.balance =
    remainingBalance - paymentAmount;

  currentSale.clearedAmount =
    (parseFloat(currentSale.clearedAmount) || 0) + paymentAmount;

  currentSale.clearedDate = new Date().toISOString();

  if(currentSale.balance <= 0){
    currentSale.balance = 0;
    currentSale.status  = "PAID";
  } else {
    currentSale.status = "PARTIAL";
  }

  // Add a separate clearance record if payment is on a different day
  if(today !== saleDate){

    const debtPayment = {
      receiptNo:  crypto.randomUUID(),
      originalReceiptNo: currentSale.receiptNo,
      product:    currentSale.product,
      customer:   currentSale.customer || currentSale.debtor || "N/A",
      debtor:     currentSale.debtor   || currentSale.customer || "N/A",
      qty:        0,
      total:      paymentAmount,
      amountPaid: paymentAmount,
      balance:    0,
      payment:    "Debt Clearance",
      status:     "PAID",
      date:       new Date().toISOString(),
      clearedDate: new Date().toISOString()
    };

    allSales.unshift(debtPayment);

    // Sync the new clearance record to Supabase
    if(navigator.onLine){
      await supabaseClient
        .from("sales")
        .insert([debtPayment]);
    }
  }

  // Save locally
  localStorage.setItem("allSales", JSON.stringify(allSales));

  // Sync the updated original sale to Supabase
  if(navigator.onLine){

    const { error } =
      await supabaseClient
        .from("sales")
        .upsert(
          [currentSale],
          { onConflict: "receiptNo" }
        );

    if(error){
      console.error("Supabase update failed:", error);
      // Queue for retry when back online
      const pending =
        JSON.parse(localStorage.getItem("pendingSales")) || [];
      pending.push(currentSale);
      localStorage.setItem("pendingSales", JSON.stringify(pending));
    } else {
      console.log("✅ Debt payment synced to Supabase");
    }

  } else {

    // Offline — queue for later
    const pending =
      JSON.parse(localStorage.getItem("pendingSales")) || [];
    pending.push(currentSale);
    localStorage.setItem("pendingSales", JSON.stringify(pending));

  }

  renderSales();
  updateSummary();

  if(currentSale.balance > 0){
    alert(`✅ Partial payment recorded.\nRemaining balance: Ksh ${currentSale.balance}`);
  } else {
    alert("✅ Debt fully cleared!");
  }

}

function backupData(){

    {type:"application/json"}

  const a = document.createElement("a");

  a.href = URL.createObjectURL(blob);

  a.download =
    `sales_backup_${

    }.json`;

  a.click();

}

function restoreData(event){

  const file = event.target.files[0];

  if(!file) return;

  const reader = new FileReader();

  reader.onload = e => {

    try{

      const restored =
        JSON.parse(e.target.result);

      if(Array.isArray(restored)){

        localStorage.setItem(
          "allSales",
          JSON.stringify(restored)
        );

        allSales = restored.reverse();

        renderSales();

        updateSummary();

        alert("✅ Restored successfully!");

      }

    } catch {

      alert("❌ Invalid backup file.");

    }

  };

  reader.readAsText(file);

}

async function syncPendingSales() {

  const pending =
    JSON.parse(localStorage.getItem("pendingSales")) || [];

  if (!pending.length) return;

  // REMOVE duplicates BEFORE sending
  const unique = [];
  const seen = new Set();

  for (const item of pending) {
    if (seen.has(item.receiptNo)) continue;
    seen.add(item.receiptNo);
    unique.push(item);
  }

  const { error } =
    await supabaseClient
      .from("sales")
      .upsert(unique, { onConflict: "receiptNo" });

  if (error) {
    console.error("Sales Sync Error:", error);
    return;
  }

  localStorage.removeItem("pendingSales");

  console.log("✅ Sales synced successfully");
}

async function syncAllLocalSales() {

  let sales =
    JSON.parse(localStorage.getItem("allSales")) || [];

  if (!sales.length) return;

  // ✅ REMOVE duplicates
  const seen = new Set();
  sales = sales.filter(item => {
    if (seen.has(item.receiptNo)) return false;
    seen.add(item.receiptNo);
    return true;
  });

  const { error } =
    await supabaseClient
      .from("sales")
      .upsert(sales, { onConflict: "receiptNo" });

  if (error) {
    console.error("Full sync error:", error);
  } else {
    console.log("✅ Existing sales synced");
  }
}

function dedupeByReceiptNo(list) {
  const seen = new Set();
  return list.filter(item => {
    if (seen.has(item.receiptNo)) return false;
    seen.add(item.receiptNo);
    return true;
  });
}
supabaseClient
  .channel("sales-changes")
  .on(
    "postgres_changes",
    {
      event: "*",
      schema: "public",
      table: "sales"
    },
    () => {
      loadSalesFromSupabase();
    }
  )
  .subscribe();
