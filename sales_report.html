// ── Format ──
function formatMoney(amount) {
  return new Intl.NumberFormat('en-KE', { style:'currency', currency:'KES' }).format(amount || 0);
}

// ── Load Sales ──
async function loadSalesFromSupabase() {
  const { data, error } = await supabaseClient
    .from("sales").select("*").order("date", { ascending: false });

  if (error) {
    console.error("Error loading sales:", error);
    allSales = JSON.parse(localStorage.getItem("allSales")) || [];
  } else {
    allSales = data || [];
    localStorage.setItem("allSales", JSON.stringify(allSales));
    console.log("✅ Sales loaded from Supabase");
  }
  renderSales();
  updateSummary();
}

// ── Render Sales ──
function renderSales(data = allSales) {
  const tbody = document.getElementById("salesTableBody");
  tbody.innerHTML = "";

  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="11" class="no-data">No sales found.</td></tr>`;
    return;
  }

  data.forEach((sale, index) => {
    const statusClass = sale.status === "PAID" ? "status-paid" : "status-unpaid";
    tbody.innerHTML += `
      <tr>
        <td>${sale.receiptNo || "-"}</td>
        <td>${sale.product}</td>
        <td>${sale.debtor?.trim() || sale.customer?.trim() || "N/A"}</td>
        <td>${sale.qty}</td>
        <td>${formatMoney(sale.total)}</td>
        <td>${formatMoney(sale.amountPaid)}</td>
        <td>${formatMoney(sale.balance)}</td>
        <td>${sale.payment}</td>
        <td class="${statusClass}">${sale.status}</td>
        <td>${new Date(sale.date).toLocaleString()}</td>
        <td>${sale.balance > 0
          ? `<button class="btn btn-pay" onclick="markAsPaid(${index})">Mark Paid</button>`
          : "-"}</td>
      </tr>`;
  });
}

// ── Summary ──
function updateSummary(data = allSales) {
  let totalSales = 0, totalPaid = 0, totalDebt = 0;
  const daily = {};

  data.forEach(sale => {
    totalSales += parseFloat(sale.total) || 0;
    totalPaid  += parseFloat(sale.amountPaid) || 0;
    totalDebt  += parseFloat(sale.balance) || 0;

    const day = new Date(sale.date).toISOString().split("T")[0];
    if (!daily[day]) daily[day] = { sales:0, paid:0, debt:0 };
    daily[day].sales += parseFloat(sale.total) || 0;
    daily[day].paid  += parseFloat(sale.amountPaid) || 0;
    daily[day].debt  += parseFloat(sale.balance) || 0;
  });

  document.getElementById("totalSales").innerText        = formatMoney(totalSales);
  document.getElementById("totalPaid").innerText         = formatMoney(totalPaid);
  document.getElementById("totalDebt").innerText         = formatMoney(totalDebt);
  document.getElementById("totalTransactions").innerText = data.length;

  const dailyContainer = document.getElementById("dailySummary");
  dailyContainer.innerHTML = "";
  const sortedDays = Object.keys(daily).sort((a,b) => new Date(b)-new Date(a));

  if (sortedDays.length) {
    const latestDay = sortedDays[0];
    dailyContainer.innerHTML += `
      <div class="daily-card">
        <strong>${latestDay} (Current)</strong>
        <p>Sales: ${formatMoney(daily[latestDay].sales)}</p>
        <p>Paid:  ${formatMoney(daily[latestDay].paid)}</p>
        <p>Debt:  ${formatMoney(daily[latestDay].debt)}</p>
      </div>`;

    if (sortedDays.length > 1) {
      dailyContainer.innerHTML += `
        <button class="summary-toggle" onclick="toggleDailyReports()" id="toggleBtn">+ Show All Reports</button>
        <div id="allDailyReports" class="hidden-summary"></div>`;

      const allReports = document.getElementById("allDailyReports");
      sortedDays.slice(1).forEach(day => {
        allReports.innerHTML += `
          <div class="daily-card">
            <strong>${day}</strong>
            <p>Sales: ${formatMoney(daily[day].sales)}</p>
            <p>Paid:  ${formatMoney(daily[day].paid)}</p>
            <p>Debt:  ${formatMoney(daily[day].debt)}</p>
          </div>`;
      });
    }
  }
}

function toggleDailyReports() {
  const reports = document.getElementById("allDailyReports");
  const btn     = document.getElementById("toggleBtn");
  const hidden  = reports.classList.toggle("hidden-summary");
  btn.innerHTML = hidden ? "+ Show All Reports" : "− Hide Reports";
}

// ── Filter ──
function filterSales() {
  const search  = document.getElementById("searchInput").value.toLowerCase();
  const payment = document.getElementById("paymentFilter").value;
  const status  = document.getElementById("statusFilter").value;
  const date    = document.getElementById("dateFilter").value;

  const filtered = allSales.filter(sale => {
    const matchesSearch  = sale.product?.toLowerCase().includes(search) || sale.customer?.toLowerCase().includes(search);
    const matchesPayment = !payment || sale.payment === payment;
    const matchesStatus  = !status  || sale.status  === status;
    const matchesDate    = !date    || new Date(sale.date).toISOString().split("T")[0] === date;
    return matchesSearch && matchesPayment && matchesStatus && matchesDate;
  });

  renderSales(filtered);
  updateSummary(filtered);
}

document.getElementById("searchInput").addEventListener("input",  filterSales);
document.getElementById("paymentFilter").addEventListener("change", filterSales);
document.getElementById("statusFilter").addEventListener("change",  filterSales);
document.getElementById("dateFilter").addEventListener("change",    filterSales);

// ── Mark as Paid ──
async function markAsPaid(index) {
  const search  = document.getElementById("searchInput").value.toLowerCase();
  const payment = document.getElementById("paymentFilter").value;
  const status  = document.getElementById("statusFilter").value;
  const date    = document.getElementById("dateFilter").value;

  const filtered = allSales.filter(sale => {
    const matchesSearch  = sale.product?.toLowerCase().includes(search) || sale.customer?.toLowerCase().includes(search);
    const matchesPayment = !payment || sale.payment === payment;
    const matchesStatus  = !status  || sale.status  === status;
    const matchesDate    = !date    || new Date(sale.date).toISOString().split("T")[0] === date;
    return matchesSearch && matchesPayment && matchesStatus && matchesDate;
  });

  const sale = filtered[index];
  if (!sale) return;

  const originalIndex = allSales.findIndex(s =>
    s.product === sale.product && s.date === sale.date && s.debtor === sale.debtor
  );
  if (originalIndex === -1) return;

  const currentSale      = allSales[originalIndex];
  const remainingBalance = parseFloat(currentSale.balance) || 0;
  if (remainingBalance <= 0) { alert("No outstanding balance."); return; }

  const paymentInput = prompt(`Outstanding balance is Ksh ${remainingBalance}\n\nEnter amount paid:`);
  if (paymentInput === null) return;

  const paymentAmount = parseFloat(paymentInput);
  if (isNaN(paymentAmount) || paymentAmount <= 0) { alert("Enter a valid payment amount."); return; }
  if (paymentAmount > remainingBalance)            { alert("Payment cannot exceed balance."); return; }

  const today    = new Date().toISOString().split("T")[0];
  const saleDate = new Date(currentSale.date).toISOString().split("T")[0];

  currentSale.amountPaid    = (parseFloat(currentSale.amountPaid) || 0) + paymentAmount;
  currentSale.balance       = remainingBalance - paymentAmount;
  currentSale.clearedAmount = (parseFloat(currentSale.clearedAmount) || 0) + paymentAmount;
  currentSale.clearedDate   = new Date().toISOString();
  currentSale.status        = currentSale.balance <= 0 ? "PAID" : "PARTIAL";
  if (currentSale.balance <= 0) currentSale.balance = 0;

  if (today !== saleDate) {
    const debtPayment = {
      receiptNo: crypto.randomUUID(), originalReceiptNo: currentSale.receiptNo,
      product:   currentSale.product,
      customer:  currentSale.customer || currentSale.debtor || "N/A",
      debtor:    currentSale.debtor   || currentSale.customer || "N/A",
      qty: 0, total: paymentAmount, amountPaid: paymentAmount, balance: 0,
      payment: "Debt Clearance", status: "PAID",
      date: new Date().toISOString(), clearedDate: new Date().toISOString()
    };
    allSales.unshift(debtPayment);
    if (navigator.onLine) await supabaseClient.from("sales").insert([debtPayment]);
  }

  localStorage.setItem("allSales", JSON.stringify(allSales));

  if (navigator.onLine) {
    const { error } = await supabaseClient.from("sales").upsert([currentSale], { onConflict: "receiptNo" });
    if (error) {
      console.error("Supabase update failed:", error);
      const pending = JSON.parse(localStorage.getItem("pendingSales")) || [];
      pending.push(currentSale);
      localStorage.setItem("pendingSales", JSON.stringify(pending));
    } else {
      console.log("✅ Debt payment synced");
    }
  } else {
    const pending = JSON.parse(localStorage.getItem("pendingSales")) || [];
    pending.push(currentSale);
    localStorage.setItem("pendingSales", JSON.stringify(pending));
  }

  renderSales();
  updateSummary();
  alert(currentSale.balance > 0
    ? `✅ Partial payment recorded.\nRemaining balance: Ksh ${currentSale.balance}`
    : "✅ Debt fully cleared!"
  );
}

// ── PDF ──
function downloadPDF() {
  html2pdf().set({
    margin: 0.5,
    filename: `Sales_Report_${new Date().toISOString().split("T")[0]}.pdf`,
    image: { type:'jpeg', quality:0.98 },
    html2canvas: { scale:2 },
    jsPDF: { unit:'in', format:'letter', orientation:'landscape' }
  }).from(document.body).save();
}

// ── Backup / Restore / Reset ──
function backupData() {
  const blob = new Blob([JSON.stringify(allSales)], { type:"application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `sales_backup_${new Date().toISOString().split("T")[0]}.json`;
  a.click();
}

function restoreData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const restored = JSON.parse(e.target.result);
      if (Array.isArray(restored)) {
        localStorage.setItem("allSales", JSON.stringify(restored));
        allSales = restored.reverse();
        renderSales(); updateSummary();
        alert("✅ Restored successfully!");
      }
    } catch { alert("❌ Invalid backup file."); }
  };
  reader.readAsText(file);
}

function resetSystem() {
  if (!confirm("Delete ALL system data?")) return;
  if (prompt("Type DELETE to continue:") !== "DELETE") { alert("Reset cancelled."); return; }
  localStorage.removeItem("products");
  localStorage.removeItem("allSales");
  localStorage.removeItem("sellIndices");
  alert("✅ System reset successful!");
  window.location.href = "Home Stock.html";
}

// ── Go Back ──
function goBack() {
  const user = JSON.parse(localStorage.getItem("loggedInUser"));
  window.location.href = user?.role === "Admin" ? "Stock.html" : "user_stock.html";
}

// ── Sync ──
function queueSaleForSync(sale) {
  const pending = JSON.parse(localStorage.getItem("pendingSales")) || [];
  pending.push(sale);
  localStorage.setItem("pendingSales", JSON.stringify(pending));
}

async function syncPendingSales() {
  const pending = JSON.parse(localStorage.getItem("pendingSales")) || [];
  if (!pending.length) return;
  const seen = new Set();
  const unique = pending.filter(item => { if (seen.has(item.receiptNo)) return false; seen.add(item.receiptNo); return true; });
  const { error } = await supabaseClient.from("sales").upsert(unique, { onConflict:"receiptNo" });
  if (error) console.error("Sales Sync Error:", error);
  else { localStorage.removeItem("pendingSales"); console.log("✅ Sales synced"); }
}

async function syncAllLocalSales() {
  let sales = JSON.parse(localStorage.getItem("allSales")) || [];
  if (!sales.length) return;
  const seen = new Set();
  sales = sales.filter(item => { if (seen.has(item.receiptNo)) return false; seen.add(item.receiptNo); return true; });
  const { error } = await supabaseClient.from("sales").upsert(sales, { onConflict:"receiptNo" });
  if (error) console.error("Full sync error:", error);
  else console.log("✅ Existing sales synced");
}

// ── Real-time ──
supabaseClient
  .channel("sales-changes")
  .on("postgres_changes", { event:"*", schema:"public", table:"sales" }, () => loadSalesFromSupabase())
  .subscribe();

// ── Init ──
document.addEventListener("DOMContentLoaded", async () => {
  buildSidebar();
  await loadSalesFromSupabase();
  if (navigator.onLine) {
    await syncAllLocalSales();
    await syncPendingSales();
    await loadSalesFromSupabase();
  }
});

window.addEventListener("online", async () => {
  await syncAllLocalSales();
  await syncPendingSales();
  await loadSalesFromSupabase();
});

</script>
