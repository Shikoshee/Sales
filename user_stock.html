<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stock - User View</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f9f9f9; }
    h1 { text-align: center; color: #333; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      background: #fff;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    table, th, td { border: 1px solid #ddd; }
    th {
      background: #28a745;
      color: #fff;
      padding: 10px;
      text-align: center;
    }
    td { padding: 8px; text-align: center; }
    .btn {
      padding: 6px 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 2px;
    }
    .btn-sell { background: #28a745; color: #fff; }

    /* Dashboard button style */
    .dashboard-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      background: #007BFF;
      color: #fff;
      padding: 10px 18px;
      border-radius: 5px;
      font-weight: bold;
      text-decoration: none;
      transition: background 0.3s;
    }
    .dashboard-btn:hover { background: #0056b3; }

    /* Search bar */
    .search-bar { margin-top: 20px; text-align: center; }
    .search-bar input {
      width: 300px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 1rem;
    }

    /* Backup/restore buttons */
    .btn-container {
      text-align: center;
      margin-top: 15px;
      margin-bottom: 15px;
    }

    /* Search + Sort Bar */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 20px 0;
    }
    .top-bar input, .top-bar select {
      padding: 8px;
      font-size: 1rem;
    }
    .sort-bar label {
      margin-right: 8px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  

  <!-- Dashboard Button -->
  <a href="#" class="dashboard-btn" onclick="openUserDashboard(event)">🏠 Dashboard</a>

  <h1>📦 Stock (User View)</h1>

  <!-- Backup and Restore -->
  <div class="btn-container">
    <button class="btn btn-add" onclick="backupProducts()">🧾 Backup Products</button>
    <button class="btn btn-edit" onclick="document.getElementById('restoreFile').click()">🔁 Restore Products</button>
    <input type="file" id="restoreFile" accept=".json" style="display:none" onchange="restoreProducts(event)">
  </div>

  <!-- Search + Sort Bar -->
  <div class="top-bar">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search by product name..." onkeyup="filterProducts()">
    </div>
    <div class="sort-bar">
      <label for="sortOption"><strong>Sort by:</strong></label>
      <select id="sortOption" onchange="sortProducts()">
        <option value="">-- Select --</option>
        <option value="alphabetical">Alphabetical (A–Z)</option>
        <option value="quantity">Quantity (Lowest → Highest)</option>
        <option value="expiry">Expiry Date (Earliest First)</option>
      </select>
    </div>
  </div>

  <!-- Stock table -->
  <table id="stockTable">
    <thead>
      <tr>
        <th>Select</th>
        <th>Product Name</th>
        <th>Buying Price</th>
        <th>Wholesale Price</th>
        <th>Retail Price</th>
        <th>Weight</th>
        <th>Company</th>
        <th>Category</th>
        <th>Details</th>
        <th>Quantity</th>
        <th>Expiry Date</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <button class="btn btn-sell" onclick="proceedToSell()">Proceed to Sell</button>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
let products = [];
    function renderTable(data = products) {
      const tbody = document.querySelector("#stockTable tbody");
      tbody.innerHTML = "";
      if (data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="11">No products available.</td></tr>`;
        return;
      }
      data.forEach((prod, index) => {
        tbody.innerHTML += `
          <tr>
            <td><input type="checkbox" class="sell-check" value="${index}"></td>
            <td>${prod.productName}</td>
            <td>${prod.buyingPrice}</td>
            <td>${prod.wholesalePrice}</td>
            <td>${prod.retailPrice}</td>
            <td>${prod.weight}</td>
            <td>${prod.company}</td>
            <td>${prod.category}</td>
            <td>${prod.details}</td>
            <td>${prod.quantity}</td>
            <td>${prod.expiryDate}</td>
          </tr>`;
      });
    }

    // Search function
    function filterProducts() {
      const query = document.getElementById("searchInput").value.toLowerCase();
      const filtered = products.filter(prod =>
        prod.productName.toLowerCase().includes(query)
      );
      renderTable(filtered);
    }

    // Sort function
    function sortProducts() {
      const sortType = document.getElementById("sortOption").value;
      if (sortType === "alphabetical") {
        products.sort((a, b) => a.productName.localeCompare(b.productName));
      } else if (sortType === "quantity") {
        products.sort((a, b) => a.quantity - b.quantity);
      } else if (sortType === "expiry") {
        products.sort((a, b) => new Date(a.expiryDate) - new Date(b.expiryDate));
      }
      renderTable();
    }

    // Proceed to sell
    function proceedToSell() {
      const selected = Array.from(document.querySelectorAll(".sell-check:checked")).map(cb => parseInt(cb.value));
      if (selected.length === 0) {
        alert("Select at least one product to sell!");
        return;
      }
  localStorage.setItem("sellIndices", JSON.stringify(selected));
  window.location.href = "Sell.html";
    }

    // Backup Products
    function backupProducts() {
      if (!products.length) return alert("No products to back up.");
      const blob = new Blob([JSON.stringify(products)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `products_backup_${new Date().toISOString().split("T")[0]}.json`;
      a.click();
    }

    // Restore Products
    function restoreProducts(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const restored = JSON.parse(e.target.result);
          if (Array.isArray(restored)) {
            products = restored;
            localStorage.setItem("products", JSON.stringify(products));
            renderTable();
            alert("✅ Products restored successfully!");
          } else {
            alert("❌ Invalid file format.");
          }
        } catch {
          alert("❌ Error reading file.");
        }
      };
      reader.readAsText(file);
      
    }

    // Initial render
    renderTable();

    // Ensure dashboard button always opens the user dashboard
    function openUserDashboard(e) {
      if (e) e.preventDefault();
      window.location.href = 'user_dashboard.html';
    }
    // SUPABASE 



const supabaseUrl = "https://quhorqxtzhpuxeujgxfw.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1aG9ycXh0emhwdXhldWpneGZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNTI2NzgsImV4cCI6MjA5NTYyODY3OH0._bldtcFHB59obsAsxC7ctKn-EqoQqKnwLTXowo2ppF8";


const supabaseClient = supabase.createClient(
  supabaseUrl,
  supabaseKey
);

async function loadProducts() {

  try {

    const { data, error } = await supabaseClient
      .from("products")
      .select("*")
      .order("productName", { ascending: true });

    if (error) throw error;

    products = data || [];

    // Cache locally for offline use
    localStorage.setItem(
      "products",
      JSON.stringify(products)
    );

    renderTable();

    console.log("✅ Products loaded from Supabase");

  } catch (err) {

    console.error(
      "Supabase load failed:",
      err
    );

    // Offline fallback
    products =
      JSON.parse(
        localStorage.getItem("products")
      ) || [];

    renderTable();

    console.log(
      "📦 Loaded products from local cache"
    );

  }

}
// Sync all products from localStorage to Supabase
async function syncProductsToSupabase() {

  const products =
    JSON.parse(localStorage.getItem("products")) || [];

  if (!products.length) {
    console.log("No products to sync");
    return;
  }

  // Remove duplicates by product name
  const uniqueProducts = [];

  const seen = new Set();

  products.forEach(product => {

    const key =
      product.productName?.trim().toLowerCase();

    if (!seen.has(key)) {

      seen.add(key);

      uniqueProducts.push(product);

    }

  });

  const { error } = await supabaseClient
    .from("products")
    .upsert(uniqueProducts, {
      onConflict: "id"
    });

  if (error) {

    console.error(
      "Products Sync Error:",
      error
    );

  } else {

    console.log(
      "✅ Products synced to Supabase"
    );

  }

}

// Auto sync when page opens
document.addEventListener(
  "DOMContentLoaded",
  async () => {

    await loadProducts();

    if (navigator.onLine) {

      await syncProductsToSupabase();

      await loadProducts();

    }

  }
);

// Auto sync when internet returns
window.addEventListener(
  "online",
  async () => {

    await syncProductsToSupabase();

    await loadProducts();

  }
);
// Auto sync after restore
const originalRestoreProducts =
  restoreProducts;

restoreProducts = function(event) {

  originalRestoreProducts(event);

  setTimeout(() => {

    syncProductsToSupabase();

  }, 1000);

};

supabaseClient
  .channel("products-live")
  .on(
    "postgres_changes",
    {
      event: "*",
      schema: "public",
      table: "products"
    },
    () => {
      loadProducts();
    }
  )
  .subscribe();
supabaseClient
  .channel("products-live")
  .on(
    "postgres_changes",
    {
      event: "*",
      schema: "public",
      table: "products"
    },
    () => {
      loadProducts();
    }
  )
  .subscribe();

  </script>
</body>
</html>
