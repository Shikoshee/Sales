<script>

const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

// ── Sidebar ──
const ADMIN_LINKS = [
  { href:"admin_dashboard.html", icon:"ti-home",          label:"Dashboard"     },
  { href:"Stock.html",           icon:"ti-box",           label:"Stock"         },

const USER_LINKS = [
  { href:"user_dashboard.html",  icon:"ti-home",          label:"Dashboard"     },
  { href:"user_stock.html",      icon:"ti-box",           label:"View Stock"    },
  { href:"Sell.html",            icon:"ti-shopping-cart", label:"Sell Products" },
  { href:"sales_report.html",    icon:"ti-chart-bar",     label:"Sales Reports" },
  { href:"debts.html",           icon:"ti-coin",          label:"Debts"         },
];

function buildSidebar() {
  const user  = JSON.parse(localStorage.getItem("loggedInUser"));
  const links = user?.role === "Admin" ? ADMIN_LINKS : USER_LINKS;
  const currentPage = window.location.pathname.split("/").pop();

  document.getElementById("sidebarLinks").innerHTML = links.map(l => `
    <a href="${l.href}" ${l.href === currentPage ? 'class="active-link"' : ''}>
      <i class="ti ${l.icon}" aria-hidden="true"></i>
      <span class="nav-label">${l.label}</span>
    </a>
  `).join("");
}

function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("active");
}

// ── State ──
let products       = JSON.parse(localStorage.getItem("products")) || [];
let selectedProducts = JSON.parse(localStorage.getItem("sellIndices")) || [];
let saleCompleted  = false;

const container   = document.getElementById("sellContainer");
const searchInput = document.getElementById("searchProduct");
const searchResults = document.getElementById("searchResults");

// ── Search ──
searchInput.addEventListener("input", function(){
  const value = this.value.toLowerCase();
  searchResults.innerHTML = "";
  if (!value) return;
  products
    .filter(p => p.productName.toLowerCase().includes(value))
    .forEach(p => {
      const index = products.indexOf(p);
      const item  = document.createElement("div");
      item.className = "search-item";
      item.innerHTML = `${p.productName} (${p.quantity} in stock)`;
      item.onclick   = () => addToCart(index);
      searchResults.appendChild(item);
    });
});

function addToCart(index) {
  if (selectedProducts.includes(index)) { alert("Product already added!"); return; }
  selectedProducts.push(index);
  renderProducts();
  searchInput.value = "";
  searchResults.innerHTML = "";
}

function removeProduct(index) {
  selectedProducts = selectedProducts.filter(i => i !== index);
  renderProducts();
}

function formatMoney(amount) {
  return new Intl.NumberFormat('en-KE', { style:'currency', currency:'KES' }).format(amount);
}

// ── Render products ──
function renderProducts() {
  container.innerHTML = "";
  selectedProducts.forEach(index => {
    const p    = products[index];
    const card = document.createElement("div");
    card.className = "product-card";
    card.innerHTML = `
      <h3>${p.productName}</h3>
      ${p.quantity <= 5 ? `<p class="low-stock">⚠ Low Stock</p>` : ""}
      <p><strong>Available:</strong> ${p.quantity}</p>
      <p><strong>Retail:</strong> ${formatMoney(p.retailPrice)}</p>
      <p><strong>Wholesale:</strong> ${formatMoney(p.wholesalePrice || 0)}</p>
      <label>Quantity</label>
      <input type="number" class="qtyInput" min="0" max="${p.quantity}" value="1" data-index="${index}">
      <label>Discount</label>
      <input type="number" class="discountInput" min="0" value="0">
      <p><strong>Line Total:</strong> <span class="lineTotal">Ksh 0.00</span></p>
      <button class="btn" style="background:red;color:white;" onclick="removeProduct(${index})">Remove</button>
    `;
    container.appendChild(card);
  });
  updateTotals();
}

// ── Totals ──
function updateTotals() {
  let grandTotal = 0;
  const saleType = document.getElementById("saleType").value;

  document.querySelectorAll(".product-card").forEach(card => {
    const qtyInput      = card.querySelector(".qtyInput");
    const discountInput = card.querySelector(".discountInput");
    const lineTotalText = card.querySelector(".lineTotal");
    const index   = parseInt(qtyInput.dataset.index);
    const product = products[index];
    if (!product) return;

    const qty   = parseInt(qtyInput.value) || 0;
    const price = saleType === "Wholesale"
      ? parseFloat(product.wholesalePrice || product.retailPrice || 0)
      : parseFloat(product.retailPrice || 0);

    let discount = parseFloat(discountInput.value) || 0;
    let total    = qty * price;
    if (discount > total) { discount = total; discountInput.value = total; }
    total -= discount;
    if (total < 0) total = 0;
    lineTotalText.innerText = formatMoney(total);
    grandTotal += total;
  });

  const amountPaid = parseFloat(document.getElementById("amountPaid").value) || 0;
  if (amountPaid > grandTotal) document.getElementById("amountPaid").value = grandTotal;

  const finalPaid = parseFloat(document.getElementById("amountPaid").value) || 0;
  const balance   = grandTotal - finalPaid;

  document.getElementById("grandTotal").innerText = formatMoney(grandTotal);
  document.getElementById("balance").innerText    = formatMoney(balance > 0 ? balance : 0);

  toggleDebtorField();
  toggleWholesaleField();
}

function toggleWholesaleField() {
  document.getElementById("wholesaleField").classList.toggle(
    "hidden", document.getElementById("saleType").value !== "Wholesale"
  );
}

function toggleDebtorField() {
  const payment    = document.getElementById("payment").value;
  const totalSale  = parseFloat(document.getElementById("grandTotal").innerText.replace(/[^0-9.-]+/g,"")) || 0;
  const amountPaid = parseFloat(document.getElementById("amountPaid").value) || 0;
  const balance    = totalSale - amountPaid;
  document.getElementById("debtorField").classList.toggle("hidden", !(payment === "Debt" || balance > 0));
}

function togglePaymentFields() {
  const payment = document.getElementById("payment").value;
  document.getElementById("debtorField").classList.toggle("hidden", payment !== "Debt");
  document.getElementById("mpesaField").classList.toggle("hidden",  payment !== "Mpesa");
}

// ── Listeners ──
document.addEventListener("input", e => {
  if (e.target.classList.contains("qtyInput") || e.target.classList.contains("discountInput")) updateTotals();
});
document.getElementById("amountPaid").addEventListener("input", () => { updateTotals(); toggleDebtorField(); });
document.getElementById("payment").addEventListener("change",   () => { toggleDebtorField(); togglePaymentFields(); });
document.getElementById("saleType").addEventListener("change",  () => { toggleWholesaleField(); updateTotals(); });

// ── Handle Sale ──
async function handleSale(printReceipt = false) {
  const payment = document.getElementById("payment").value;

  if (payment === "Mpesa") {
    const phone = document.getElementById("mpesaPhone").value.trim();
    if (phone) {
      const paid = await sendSTKPush(phone);
      if (!paid) {
        const proceed = confirm("M-Pesa prompt failed or was not confirmed. Record the sale anyway?");
        if (!proceed) return;
      }
    }
  }

  const result = await makeSale();
  if (!result) return;

  alert("Sale completed successfully.");

  if (printReceipt) {
    printReceiptPage(result);
  } else {
    window.location.href = "sales_report.html";
  }
}

// ── Make Sale ──
async function makeSale() {
  if (saleCompleted) { alert("Sale already completed!"); return null; }

  const paymentMode  = document.getElementById("payment").value;
  const saleType     = document.getElementById("saleType").value;
  const amountPaid   = parseFloat(document.getElementById("amountPaid").value) || 0;
  const customerName = document.getElementById("customerName").value.trim() || "N/A";
  const debtorName   = document.getElementById("debtorName").value.trim();
  const wholesaleShop = document.getElementById("wholesaleShop").value.trim();
  const totalSale    = parseFloat(document.getElementById("grandTotal").innerText.replace(/[^0-9.-]+/g,""));
  const balance      = totalSale - amountPaid;

  if (totalSale <= 0)                             { alert("No products selected!"); return null; }
  if (balance > 0 && debtorName === "")           { alert("Enter debtor name."); return null; }
  if (saleType === "Wholesale" && !wholesaleShop) { alert("Enter wholesale shop name."); return null; }

  let saleDetails      = [];
  let remainingPayment = amountPaid;
  const receiptNo      = "RCPT-" + Date.now();

  document.querySelectorAll(".product-card").forEach(card => {
    const qtyInput      = card.querySelector(".qtyInput");
    const discountInput = card.querySelector(".discountInput");
    const qty     = parseInt(qtyInput.value) || 0;
    if (qty <= 0) return;

    const index   = parseInt(qtyInput.dataset.index);
    const product = products[index];
    if (qty > product.quantity) { alert(`Insufficient stock for ${product.productName}`); return; }

    const price    = saleType === "Wholesale"
      ? parseFloat(product.wholesalePrice || product.retailPrice)
      : parseFloat(product.retailPrice);
    const discount = parseFloat(discountInput.value) || 0;
    const total    = (qty * price) - discount;

    product.quantity -= qty;

    let paidForThisItem    = 0;
    let balanceForThisItem = total;

    if (remainingPayment > 0) {
      if (remainingPayment >= total) {
        paidForThisItem    = total;
        balanceForThisItem = 0;
        remainingPayment  -= total;
      } else {
        paidForThisItem    = remainingPayment;
        balanceForThisItem = total - remainingPayment;
        remainingPayment   = 0;
      }
    }

    saleDetails.push({
      receiptNo, product: product.productName, customer: customerName,
      qty, price, discount, total, payment: paymentMode,
      amountPaid: paidForThisItem, balance: balanceForThisItem,
      debtor: balanceForThisItem > 0 ? debtorName : "",
      saleType, shopName: wholesaleShop,
      status: balanceForThisItem <= 0 ? "PAID" : "PARTIAL",
      date: new Date().toISOString()
    });
  });

  localStorage.setItem("products", JSON.stringify(products));
  let allSales = JSON.parse(localStorage.getItem("allSales")) || [];
  allSales.push(...saleDetails);
  localStorage.setItem("allSales", JSON.stringify(allSales));

  const { error } = await supabaseClient.from("sales").insert(saleDetails);
  if (error) {
    console.error("Supabase insert failed:", error);
    const pending = JSON.parse(localStorage.getItem("pendingSales")) || [];
    pending.push(...saleDetails);
    localStorage.setItem("pendingSales", JSON.stringify(pending));
  }

  localStorage.removeItem("sellIndices");
  saleCompleted = true;
  return { saleDetails, totalSale, amountPaid, balance, customerName, debtorName, saleType, wholesaleShop };
}

// ── Print Receipt ──
function printReceiptPage(data) {
  const { saleDetails, totalSale, amountPaid, balance, customerName, debtorName, saleType, wholesaleShop } = data;

  const receiptHTML = `
    <h2 style="text-align:center;">ADONAI AGROVET</h2>
    <p>Receipt No: RCPT-${Date.now()}</p>
    <p>Date: ${new Date().toLocaleString()}</p>
    <p>Customer: ${customerName}</p>
    <p>Sale Type: ${saleType}</p>
    ${saleType === "Wholesale" ? `<p>Shop: ${wholesaleShop}</p>` : ""}
    <hr>
    <table width="100%" border="1" cellspacing="0" cellpadding="5">
      <tr><th>Item</th><th>Qty</th><th>Total</th></tr>
      ${saleDetails.map(item => `<tr><td>${item.product}</td><td>${item.qty}</td><td>${formatMoney(item.total)}</td></tr>`).join("")}
    </table>
    <hr>
    <p>Total: ${formatMoney(totalSale)}</p>
    <p>Paid: ${formatMoney(amountPaid)}</p>
    <p>Balance: ${formatMoney(balance)}</p>
    ${balance > 0 ? `<p>Debtor: ${debtorName}</p>` : ""}
    <p style="text-align:center;">Thank You 🙏</p>
  `;

  const win = window.open("", "", "width=350,height=700");
  if (!win) {
    alert("Popup blocked — please allow popups to print receipts. Redirecting to sales report.");
    window.location.href = "sales_report.html";
    return;
  }

  win.document.write(`
    <html><head><title>Receipt</title>
    <style>body{font-family:monospace;padding:10px;}table{width:100%;border-collapse:collapse;font-size:12px;}</style>
    </head><body>${receiptHTML}</body></html>
  `);
  win.document.close();
  win.print();

  let redirected = false;
  function goToReport() { if (redirected) return; redirected = true; window.location.href = "sales_report.html"; }

  win.onafterprint = () => { win.close(); goToReport(); };
  const checkClosed = setInterval(() => { if (win.closed) { clearInterval(checkClosed); goToReport(); } }, 500);
}

// ── Go Back ──
function goBack() {
  const user = JSON.parse(localStorage.getItem("loggedInUser"));
  if (user?.role === "User")       window.location.href = "user_stock.html";
  else if (user?.role === "Admin") window.location.href = "Stock.html";
  else { alert("Session expired."); window.location.href = "Home Stock.html"; }
}

// ── STK Push ──
async function sendSTKPush(phone) {
  const amount = parseFloat(document.getElementById("amountPaid").value) || 0;
  if (amount <= 0) { alert("Enter the amount paid before sending M-Pesa prompt."); return false; }
  const response = await fetch("https://quhorqxtzhpuxeujgxfw.supabase.co/stkpush", {
    method: "POST",
    headers: { "Content-Type":"application/json" },
    body: JSON.stringify({ phone, amount })
  });
  const result = await response.json();
  return result.success;
}

async function triggerMpesaPrompt() {
  const phone  = document.getElementById("mpesaPhone").value.trim();
  const amount = parseFloat(document.getElementById("amountPaid").value) || 0;
  if (!phone)        { alert("Please enter the customer's phone number."); return; }
  if (amount <= 0)   { alert("Please enter the amount paid before sending M-Pesa prompt."); return; }

  try {
    const response = await fetch("https://quhorqxtzhpuxeujgxfw.supabase.co/functions/v1/stkpush", {
      method: "POST",
      headers: { "Content-Type":"application/json", "apikey": supabaseKey, "Authorization": "Bearer " + supabaseKey },
      body: JSON.stringify({ phone, amount })
    });
    const result = await response.json();
    if (response.ok) alert(`✅ M-Pesa prompt of Ksh ${amount.toLocaleString()} sent. Customer should enter their PIN.`);
    else alert(result.error || "Failed to send M-Pesa prompt.");
  } catch(err) {
    console.error(err);
    alert("Unable to connect to the payment server.");
  }
}

// ── Sync ──
async function syncAllSalesToSupabase() {
  let sales = JSON.parse(localStorage.getItem("allSales")) || [];
  if (!sales.length) return;
  const seen = new Set();
  const unique = sales.filter(s => { const k = `${s.receiptNo}_${s.product}_${s.date}`; if (seen.has(k)) return false; seen.add(k); return true; });
  const { error } = await supabaseClient.from("sales").insert(unique);
  if (error) console.error("Sell Sync Error:", error);
  else console.log("✅ allSales synced");
}

// ── Init ──
document.addEventListener("DOMContentLoaded", () => {
  buildSidebar();
  toggleWholesaleField();
  toggleDebtorField();
  togglePaymentFields();
  updateTotals();
  renderProducts();
  if (navigator.onLine) syncAllSalesToSupabase();
});

window.addEventListener("online", syncAllSalesToSupabase);

</script>
