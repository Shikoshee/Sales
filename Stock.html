  <style>
    body {

    h1 {

    table {

    table, th, td {

    th {

      background: #fff;

    .btn {
      padding: 6px 12px;

      border-radius: 5px;
      cursor: pointer;
      margin: 2px;

    .btn-add { background: #28a745; color: #fff; }
    .btn-edit { background: #ffc107; color: #000; }
    .btn-delete { background: #dc3545; color: #fff; }

    
    .search-bar {
      margin-top: 20px;
      text-align: center;
    }
    .search-bar input {
      width: 300px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 1rem;
    }
    .btn-container {
      text-align: center;
      margin-top: 15px;
      margin-bottom: 15px;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 20px 0;
    }
    .top-bar input, .top-bar select {
      padding: 8px;
      font-size: 1rem;
    }
    .sort-bar label {
      margin-right: 8px;
      font-weight: bold;
    }
    .hidden {
  display: none;
}
/* Sidebar */
.sidebar {
  position: fixed;
  top: 10px;
  left: 10px;
  width: 0;              /* hidden by default */
  height: auto;
  background: #007BFF;
  color: white;
  overflow: hidden;
  transition: width 0.3s ease;
  border-radius: 8px;
  z-index: 1000;
  padding: 0;
}

/* Expanded sidebar */
.sidebar.active {
  width: 240px;
  padding: 15px;
}

/* Logo and links hidden by default */
.logo,
.sidebar a {
  display: none;
}

/* Show when opened */
.sidebar.active .logo,
.sidebar.active a {
  display: flex;
}

/* Logo */
.logo {
  justify-content: center;
  margin: 10px 0 20px;
  font-size: 1.2rem;
}

/* Links */
.sidebar a {
  color: white;
  text-decoration: none;
  padding: 10px;
  border-radius: 6px;
  align-items: center;
  gap: 10px;
}

.sidebar a:hover {
  background: rgba(255,255,255,0.2);
}

/* Always visible menu button */
.toggle-btn {
  position: fixed;
  top: 30px;
  left: 20px;
  background: #1458a7;
  color: white;
  border: none;
  padding: 10px 12px;
  cursor: pointer;
  border-radius: 5px;
  font-size: 20px;
  z-index: 1001;
}

/* shift page content */

/* Main content area */
.main-content {
  margin-left: 240px;
  padding: 20px;
  transition: 0.3s;
}

/* when sidebar collapsed */
.sidebar.collapsed ~ .main-content {
  margin-left: 70px;
}



body.collapsed {
  margin-left: 70px;
}

  </style>
</head>
<body>

<!-- Sidebar -->
<!-- Sidebar -->
<div class="sidebar" id="sidebar">

<div class="main-content">

  <h1>Stock Taking System</h1>

  <!-- everything else goes here -->

</div>
 
  <!-- Backup / Restore -->
  <div class="btn-container">
    <button class="btn btn-add" onclick="backupProducts()">🧾 Backup Products</button>
    <button class="btn btn-edit" onclick="document.getElementById('restoreFile').click()">🔁 Restore Products</button>
    <input type="file" id="restoreFile" accept=".json" style="display:none" onchange="restoreProducts(event)">
  </div>
  <!-- Form to add products -->
   <!-- Add Product Button -->
<div class="btn-container">
  <button class="btn btn-add" onclick="toggleForm()">➕ Add Product</button>
</div>

<!-- Hidden Form -->
<div id="formContainer" class="form-container hidden">

  <input type="text" id="productName" placeholder="Product Name">
  <input type="number" id="buyingPrice" placeholder="Buying Price">
  <input type="number" id="wholesalePrice" placeholder="Wholesale Price">
  <input type="number" id="retailPrice" placeholder="Retail Price">
  <!--<input type="text" id="weight" placeholder="Weight">-->
   <!-- Weight Section -->
  <div class="weight-group">
    <input type="number" id="weight" placeholder="Weight">
    
    <select id="weightUnit">
      <option value="">Select Unit</option>
      <option value="g">Grams (g)</option>
      <option value="kg">Kilograms (kg)</option>
      <option value="ml">Millilitres (ml)</option>
      <option value="l">Litres (L)</option>
      <option value="pcs">Pieces</option>
      <option value="packs">Packs</option>
    </select>
  </div>
  <input type="text" id="company" placeholder="Company">
  <input type="text" id="category" placeholder="Category">
  <input type="text" id="details" placeholder="Details">
  <input type="number" id="quantity" placeholder="Quantity">
  <input type="date" id="expiryDate">

  <button class="btn btn-add" onclick="addProduct()">Add Product</button>

</div>
  <!-- Search + Sort -->
  <div class="top-bar">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search by product name..." onkeyup="filterProducts()">
    </div>
    <div class="sort-bar">
      <label for="sortOption"><strong>Sort by:</strong></label>
      <select id="sortOption" onchange="sortProducts()">
        <option value="">-- Select --</option>
        <option value="alphabetical">Alphabetical (A–Z)</option>
        <option value="quantity">Quantity (Lowest → Highest)</option>
        <option value="expiry">Expiry Date (Earliest First)</option>
      </select>
    </div>
  </div>

  <!-- Stock Table -->
  <table id="stockTable">
    <thead>
      <tr>
        <th>Select</th>
        <th>Product Name</th>
        <th>Buying Price</th>
        <th>Wholesale Price</th>
        <th>Retail Price</th>
        <th>Weight</th>
        <th>Company</th>
        <th>Category</th>
        <th>Details</th>
        <th>Quantity</th>
        <th>Expiry Date</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <button class="btn btn-add" onclick="proceedToSell()">Proceed to Sell</button>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
let products = [];
    function renderTable(list = products) {
      const tbody = document.querySelector("#stockTable tbody");
      tbody.innerHTML = "";
      list.forEach((prod, index) => {
        let row = `
          <tr>
            <td><input type="checkbox" class="sell-check" value="${index}"></td>
            <td>${prod.productName}</td>
            <td>${prod.buyingPrice}</td>
            <td>${prod.wholesalePrice}</td>
            <td>${prod.retailPrice}</td>
            <td>${prod.weight}</td>
            <td>${prod.company}</td>
            <td>${prod.category}</td>
            <td>${prod.details}</td>
            <td>${prod.quantity}</td>
            <td>${prod.expiryDate}</td>
            <td>
              <button class="btn btn-edit" onclick="editProduct(${index})">Edit</button>
              <button class="btn btn-delete" onclick="deleteProduct(${index})">Delete</button>
            </td>
          </tr>`;
        tbody.innerHTML += row;
      });
      localStorage.setItem("products", JSON.stringify(products));
    }

    function proceedToSell() {
      let selected = [];
      document.querySelectorAll(".sell-check:checked").forEach(cb => {
        selected.push(parseInt(cb.value));
      });
      if (selected.length === 0) {
        alert("Select at least one product to sell!");
        return;
      }
  localStorage.setItem("sellIndices", JSON.stringify(selected));
  window.location.href = "Sell.html";
    }

    async function addProduct() {
      
      let product = {
        productName: document.getElementById("productName").value,
        buyingPrice: document.getElementById("buyingPrice").value,
        wholesalePrice: document.getElementById("wholesalePrice").value,
        retailPrice: document.getElementById("retailPrice").value,
        weight: document.getElementById("weight").value,
        company: document.getElementById("company").value,
        category: document.getElementById("category").value,
        details: document.getElementById("details").value,
        quantity: document.getElementById("quantity").value,
        expiryDate: document.getElementById("expiryDate").value,
      };
      if (!product.productName) {
        alert("Product Name is required!");
        return;
      }
     products.push(product);
renderTable();
clearForm();

queueProductForSync(product);

if (navigator.onLine) {
  await syncPendingProducts();
  await loadProductsFromSupabase();
}
    }

    function clearForm() {
      document.querySelectorAll(".form-container input").forEach(input => input.value = "");
    }

    async function deleteProduct(index) {
  const product = products[index];

  if (!confirm("Are you sure?")) return;

  const { error } = await window.supabaseClient
    .from("products")
    .delete()
    .eq("id", product.id);

  if (error) {
    console.error(error);
    return;
  }

  await loadProductsFromSupabase();
}

    function editProduct(index) {
      let prod = products[index];
      document.getElementById("productName").value = prod.productName;
      document.getElementById("buyingPrice").value = prod.buyingPrice;
      document.getElementById("wholesalePrice").value = prod.wholesalePrice;
      document.getElementById("retailPrice").value = prod.retailPrice;
      document.getElementById("weight").value = prod.weight;
      document.getElementById("company").value = prod.company;
      document.getElementById("category").value = prod.category;
      document.getElementById("details").value = prod.details;
      document.getElementById("quantity").value = prod.quantity;
      document.getElementById("expiryDate").value = prod.expiryDate;
      products.splice(index, 1);
      renderTable();
    }

    function filterProducts() {
      const query = document.getElementById("searchInput").value.toLowerCase();
      const filtered = products.filter(prod =>
        prod.productName.toLowerCase().includes(query)
      );
      renderTable(filtered);
    }

    function sortProducts() {
      const sortType = document.getElementById("sortOption").value;

      if (sortType === "alphabetical") {
        products.sort((a, b) => a.productName.localeCompare(b.productName));
      } else if (sortType === "quantity") {
        products.sort((a, b) => a.quantity - b.quantity);
      } else if (sortType === "expiry") {
        products.sort((a, b) => new Date(a.expiryDate) - new Date(b.expiryDate));
      }

      renderTable();
    }

    function backupProducts() {
      if (!products.length) return alert("No products to back up.");
      const blob = new Blob([JSON.stringify(products)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `products_backup_${new Date().toISOString().split("T")[0]}.json`;
      a.click();
    }

    function restoreProducts(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const restored = JSON.parse(e.target.result);
          if (Array.isArray(restored)) {
            products = restored;
            localStorage.setItem("products", JSON.stringify(products));
            renderTable();
            alert("✅ Products restored successfully!");
          } else {
            alert("❌ Invalid file format.");
          }
        } catch {
          alert("❌ Error reading file.");
        }
      };
      reader.readAsText(file);
    }

    renderTable();

    // Ensure dashboard button always opens the admin dashboard
    function openAdminDashboard(e) {
  e.preventDefault();
  window.location.href = "admin_dashboard.html";
}
function toggleForm() {
  const form = document.getElementById("formContainer");
  form.classList.toggle("hidden");
}
    
const supabaseUrl = "https://quhorqxtzhpuxeujgxfw.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1aG9ycXh0emhwdXhldWpneGZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNTI2NzgsImV4cCI6MjA5NTYyODY3OH0._bldtcFHB59obsAsxC7ctKn-EqoQqKnwLTXowo2ppF8";

window.supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
function queueProductForSync(product) {
  const pending = JSON.parse(localStorage.getItem("pendingProducts")) || [];
  pending.push(product);
  localStorage.setItem("pendingProducts", JSON.stringify(pending));
}
async function syncPendingProducts() {
  const pending = JSON.parse(localStorage.getItem("pendingProducts")) || [];

  if (pending.length === 0) return;

  for (const product of pending) {
    const { error } = await window.supabaseClient
  .from("products")
  .insert(product);

    if (error) {
      console.error("Sync error:", error);
      return;
    }
  }

  localStorage.removeItem("pendingProducts");
  console.log("✅ Products synced to Supabase");
}
window.addEventListener("online", syncPendingProducts);

document.addEventListener("DOMContentLoaded", async () => {

  if (navigator.onLine) {
    await syncPendingProducts();
    await loadProductsFromSupabase();
  } else {
    loadProductsFromLocalStorage();
  }

});
function loadProductsFromLocalStorage() {
  const savedProducts = localStorage.getItem("products");

  if (savedProducts) {
    products = JSON.parse(savedProducts);
    renderTable();
    console.log("✅ Loaded products from localStorage");
  } else {
    products = [];
    renderTable();
  }
}
async function loadProductsFromSupabase() {
  const { data, error } = await window.supabaseClient
    .from("products")
    .select("*");

  if (error) {
    console.error("Error loading products:", error);

    // Fallback to localStorage
    loadProductsFromLocalStorage();
    return;
  }

  products = data || [];

  // Keep local backup updated
  localStorage.setItem("products", JSON.stringify(products));

  renderTable();
}
window.supabaseClient
  .channel("products-changes")
  .on(
    "postgres_changes",
    {
      event: "*",
      schema: "public",
      table: "products"
    },
    () => {
      loadProductsFromSupabase();
    }
  )
  .subscribe();
  function startRealtime() {
  if (window.realtimeChannel) return; // prevent duplicates
  if (!navigator.onLine) return;

  window.realtimeChannel = window.supabaseClient
    .channel("products-changes")
    .on(
      "postgres_changes",
      { event: "*", schema: "public", table: "products" },
      () => loadProductsFromSupabase()
    )
    .subscribe();
}
document.addEventListener("DOMContentLoaded", () => {
  startRealtime();
});
window.addEventListener("online", async () => {
  await syncPendingProducts();
  await loadProductsFromSupabase();
  startRealtime();
});
function loadProductsFromLocalStorage() {
  console.log("Loading from localStorage...");

  const savedProducts = localStorage.getItem("products");

  if (savedProducts) {
    products = JSON.parse(savedProducts);

    console.log("Loaded products:", products.length);

    renderTable();
  } else {
    console.log("No products found");
  }
}
function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("active");
}
  </script>
</body>
