<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
let products = [];
let editingProductId = null;
const supabaseUrl = "https://quhorqxtzhpuxeujgxfw.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1aG9ycXh0emhwdXhldWpneGZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNTI2NzgsImV4cCI6MjA5NTYyODY3OH0._bldtcFHB59obsAsxC7ctKn-EqoQqKnwLTXowo2ppF8";

window.supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
// ── Render Table ──
function renderTable(list = products) {
  const tbody = document.querySelector("#stockTable tbody");
  tbody.innerHTML = "";
  list.forEach((prod, index) => {
    tbody.innerHTML += `
      <tr>
        <td><input type="checkbox" class="sell-check" value="${index}"></td>
        <td>${prod.productName}</td>
        <td>${prod.buyingPrice}</td>
        <td>${prod.wholesalePrice}</td>
        <td>${prod.retailPrice}</td>
        <td>${prod.weight} ${prod.weightUnit || ""}</td>
        <td>${prod.company}</td>
        <td>${prod.category}</td>
        <td>${prod.details}</td>
        <td>${prod.quantity}</td>
        <td>${prod.expiryDate}</td>
        <td>
          <button class="btn btn-edit"   onclick="editProduct(${index})">Edit</button>
          <button class="btn btn-delete" onclick="deleteProduct(${index})">Delete</button>
        </td>
      </tr>`;
  });
  localStorage.setItem("products", JSON.stringify(products));
}
// ── Proceed to Sell ──
function proceedToSell() {
  const selected = [];
  document.querySelectorAll(".sell-check:checked").forEach(cb => {
    selected.push(parseInt(cb.value));
  });
  if (selected.length === 0) {
    alert("Select at least one product to sell!");
    return;
  }
  localStorage.setItem("sellIndices", JSON.stringify(selected));
  window.location.href = "Sell.html";
}
// ── Add Product ──
// ── Add Product ──
async function addProduct() {
  const product = {
    productName: document.getElementById("productName").value.trim(),
    buyingPrice: document.getElementById("buyingPrice").value.trim(),
    wholesalePrice: document.getElementById("wholesalePrice").value.trim(),
    retailPrice: document.getElementById("retailPrice").value.trim(),
    weight: document.getElementById("weight").value.trim(),
    weightUnit: document.getElementById("weightUnit").value,
    company: document.getElementById("company").value.trim(),
    category: document.getElementById("category").value.trim(),
    details: document.getElementById("details").value.trim(),
    quantity: document.getElementById("quantity").value.trim(),
    expiryDate: document.getElementById("expiryDate").value.trim()
  };

  // Validate required fields
 const missingFields = [];

if (!product.productName) missingFields.push("Product Name");
if (!product.buyingPrice) missingFields.push("Buying Price");
if (!product.wholesalePrice) missingFields.push("Wholesale Price");
if (!product.retailPrice) missingFields.push("Retail Price");
if (!product.weight) missingFields.push("Weight");
if (!product.weightUnit) missingFields.push("Weight Unit");
if (!product.quantity) missingFields.push("Quantity");
if (!product.expiryDate) missingFields.push("Expiry Date");

if (missingFields.length > 0) {
  alert("The following fields cannot be empty:\n\n" + missingFields.join("\n"));
  return;
}

  if (editingProductId) {

  product.id = editingProductId;

  const index = products.findIndex(p => p.id === editingProductId);

  if(index !== -1){
    products[index] = product;
  }

  await updateProduct(product);

  editingProductId = null;

} else {

  products.push(product);
  await saveProduct(product);

}

renderTable();
clearForm();

if(navigator.onLine){
  await loadProductsFromSupabase();
}
}
// ── Clear Form ──
function clearForm() {
  document.querySelectorAll(".form-container input").forEach(i => i.value = "");
  document.getElementById("weightUnit").value = "";
}
// ── Delete Product ──
async function deleteProduct(index){

const product = products[index];


if(!confirm("Are you sure?")) return;



if(product.id){

const {error}=await window.supabaseClient
.from("products")
.delete()
.eq("id",product.id);


if(error){
console.error(error);
return;
}

}


products.splice(index,1);


localStorage.setItem(
"products",
JSON.stringify(products)
);


renderTable();

}
async function updateProduct(product){

const {error}=await window.supabaseClient
.from("products")
.update(product)
.eq("id",product.id);


if(error){
console.error("Update error:",error);
return;
}


localStorage.setItem(
"products",
JSON.stringify(products)
);

}
// ── Edit Product ──
function editProduct(index){

const prod = products[index];

editingProductId = prod.id;


document.getElementById("productName").value = prod.productName;
document.getElementById("buyingPrice").value = prod.buyingPrice;
document.getElementById("wholesalePrice").value = prod.wholesalePrice;
document.getElementById("retailPrice").value = prod.retailPrice;
document.getElementById("weight").value = prod.weight;
document.getElementById("weightUnit").value = prod.weightUnit || "";
document.getElementById("company").value = prod.company;
document.getElementById("category").value = prod.category;
document.getElementById("details").value = prod.details;
document.getElementById("quantity").value = prod.quantity;
document.getElementById("expiryDate").value = prod.expiryDate;


document.getElementById("formContainer")
.classList.remove("hidden");

}
// ── Filter ──
function filterProducts() {
  const query = document.getElementById("searchInput").value.toLowerCase();
  const filtered = products.filter(p => p.productName.toLowerCase().includes(query));
  renderTable(filtered);
}
// ── Sort ──
function sortProducts() {
  const sortType = document.getElementById("sortOption").value;
  if (sortType === "alphabetical") {
    products.sort((a, b) => a.productName.localeCompare(b.productName));
  } else if (sortType === "quantity") {
    products.sort((a, b) => a.quantity - b.quantity);
  } else if (sortType === "expiry") {
    products.sort((a, b) => new Date(a.expiryDate) - new Date(b.expiryDate));
  }
  renderTable();
}
// ── Backup ──
function backupProducts() {
  if (!products.length) return alert("No products to back up.");
  const blob = new Blob([JSON.stringify(products)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `products_backup_${new Date().toISOString().split("T")[0]}.json`;
  a.click();
}
// ── Restore ──
function restoreProducts(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const restored = JSON.parse(e.target.result);
      if (Array.isArray(restored)) {
        products = restored;
        localStorage.setItem("products", JSON.stringify(products));
        renderTable();
        alert("✅ Products restored successfully!");
      } else {
        alert("❌ Invalid file format.");
      }
    } catch {
      alert("❌ Error reading file.");
    }
  };
  reader.readAsText(file);
}
// ── Toggle Form ──
function toggleForm() {
  document.getElementById("formContainer").classList.toggle("hidden");
}
// ── Toggle Sidebar ──
function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("active");
}
// ── Supabase Sync ──
async function saveProduct(product){

  const {data,error} = await window.supabaseClient
    .from("products")
    .insert(product)
    .select()
    .single();


  if(error){

    console.error(error);

    if(error.code === "23505"){
      alert("Product already exists");
    }

    return;
  }


  // replace local temporary product with Supabase product including id

  const index = products.findIndex(
    p => p.productName === product.productName
  );

  if(index !== -1){
    products[index] = data;
    localStorage.setItem(
      "products",
      JSON.stringify(products)
    );
  }

}
async function syncPendingProducts() {
  const pending = JSON.parse(localStorage.getItem("pendingProducts")) || [];
  if (!pending.length) return;

  const stillPending = [];

  for (const product of pending) {
    const { error } = await window.supabaseClient
      .from("products")
      .insert(product);

    if (error) {
      console.error("Sync error:", error);

      // Keep only failed products
      stillPending.push(product);
      continue;
    }
  }

  localStorage.setItem(
    "pendingProducts",
    JSON.stringify(stillPending)
  );

  console.log(
    `Synced ${pending.length - stillPending.length} products.`
  );
}
function loadProductsFromLocalStorage() {
  const saved = localStorage.getItem("products");
  products = saved ? JSON.parse(saved) : [];
  renderTable();
}
async function loadProductsFromSupabase() {
  const { data, error } = await window.supabaseClient.from("products").select("*");
  if (error) {
    console.error("Error loading products:", error);
    loadProductsFromLocalStorage();
    return;
  }
  products = data || [];
  localStorage.setItem("products", JSON.stringify(products));
  renderTable();
}
function startRealtime() {
  if (window.realtimeChannel) return;
  if (!navigator.onLine) return;
  window.realtimeChannel = window.supabaseClient
    .channel("products-changes")
    .on("postgres_changes", { event: "*", schema: "public", table: "products" },
      () => loadProductsFromSupabase()
    )
    .subscribe();
}
// ── Highlight active nav link ──
document.querySelectorAll(".sidebar a").forEach(link => {
  if (link.href === window.location.href) link.classList.add("active-link");
});
// ── Init ──
document.addEventListener("DOMContentLoaded", async () => {
  if (navigator.onLine) {
    await syncPendingProducts();
    await loadProductsFromSupabase();
    startRealtime();
  } else {
    loadProductsFromLocalStorage();
  }
});
window.addEventListener("online", async () => {
  await syncPendingProducts();
  await loadProductsFromSupabase();
  startRealtime();
});
</script>
