<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Debts Report</title>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --primary:#dc3545;
      --primary-dark:#b02a37;
      --secondary:#0d6efd;
      --success:#198754;
      --success-dark:#157347;
      --danger:#dc3545;
      --bg:#f4f6f9;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --border:#e5e7eb;
      --shadow:0 10px 25px rgba(0,0,0,0.08);
      --radius:14px;
    }

    body {
      font-family:"Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    /* ── Sidebar ── */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 64px;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
      gap: 4px;
      z-index: 1000;
      transition: width 0.25s ease;
      overflow: hidden;
    }

    .sidebar.active {
      width: 220px;
      align-items: flex-start;
      padding: 16px 12px;
    }

    .sidebar-logo {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
      flex-shrink: 0;
    }

    .sidebar.active .sidebar-logo {
      width: 100%;
      height: auto;
      background: transparent;
      border-radius: 0;
      flex-direction: row;
      gap: 10px;
      padding: 8px 4px;
      margin-bottom: 4px;
    }

    .sidebar-logo i { font-size: 20px; color: #60a5fa; }

    .sidebar-logo-text {
      display: none;
      font-size: 15px;
      font-weight: 500;
      color: #f1f5f9;
      white-space: nowrap;
    }

    .sidebar.active .sidebar-logo-text { display: block; }

    .sidebar-divider {
      width: 36px;
      height: 0.5px;
      background: #1e293b;
      margin: 4px 0 8px;
      flex-shrink: 0;
    }

    .sidebar.active .sidebar-divider {
      width: calc(100% - 8px);
      margin: 4px 4px 8px;
    }

    .sidebar a {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #94a3b8;
      flex-shrink: 0;
      transition: background 0.15s ease, color 0.15s ease;
      gap: 10px;
    }

    .sidebar.active a {
      width: 100%;
      height: auto;
      padding: 10px 12px;
      justify-content: flex-start;
    }

    .sidebar a i { font-size: 18px; flex-shrink: 0; }
    .sidebar.active a i { font-size: 17px; }

    .sidebar a .nav-label {
      display: none;
      font-size: 14px;
      white-space: nowrap;
    }

    .sidebar.active a .nav-label { display: block; }

    .sidebar a:hover { background: #1e293b; color: #e2e8f0; }
    .sidebar a.active-link { background: #1e3a5f; color: #60a5fa; }

    .sidebar a.logout-link { color: #f87171; margin-top: auto; }
    .sidebar a.logout-link:hover { background: #2d1a1a; }

    .sidebar-spacer { flex: 1; }

    .toggle-btn {
      position: fixed;
      top: 14px;
      left: 14px;
      background: transparent;
      color: #60a5fa;
      border: none;
      padding: 8px;
      cursor: pointer;
      border-radius: 6px;
      font-size: 20px;
      z-index: 1002;
      transition: background 0.15s;
    }

    .toggle-btn:hover { background: #1e293b; }

    /* ── Main content ── */
    .main-content {
      margin-left: 64px;
      padding: 20px;
      transition: margin-left 0.25s ease;
    }

    .sidebar.active ~ .main-content { margin-left: 220px; }

    /* ── Page styles ── */
    .container { max-width:1400px; margin:auto; }

    .topbar {
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:15px;
      margin-bottom:25px;
    }

    .title-area h1 { font-size:2rem; color:var(--primary); margin-bottom:5px; }
    .title-area p  { color:var(--muted); font-size:.95rem; }

    .top-actions { display:flex; gap:10px; flex-wrap:wrap; }

    .btn {
      border:none;
      cursor:pointer;
      padding:12px 18px;
      border-radius:10px;
      text-decoration:none;
      font-weight:600;
      transition:.25s ease;
      display:inline-flex;
      align-items:center;
      gap:8px;
    }

    .btn-reset { background:var(--danger); color:#fff; }
    .btn-reset:hover { background:var(--primary-dark); transform:translateY(-2px); }

    .btn-back { background:#111827; color:#fff; }
    .btn-back:hover { background:#000; transform:translateY(-2px); }

    .summary-grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
      gap:20px;
      margin-bottom:25px;
    }

    .card { background:var(--card); padding:22px; border-radius:var(--radius); box-shadow:var(--shadow); }
    .summary-card h3 { font-size:.95rem; color:var(--muted); margin-bottom:10px; }
    .summary-card .amount { font-size:2rem; font-weight:700; }
    .danger-text  { color:var(--danger); }
    .success-text { color:var(--success); }

    .search-box {
      background:var(--card);
      padding:18px;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      margin-bottom:20px;
    }

    .search-box input {
      width:100%;
      padding:14px;
      border:1px solid var(--border);
      border-radius:10px;
      font-size:1rem;
      outline:none;
      transition:.2s;
    }

    .search-box input:focus {
      border-color:var(--secondary);
      box-shadow:0 0 0 4px rgba(13,110,253,.1);
    }

    .table-card { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
    .table-wrapper { overflow-x:auto; }

    table { width:100%; border-collapse:collapse; min-width:1100px; }
    thead { background:var(--primary); color:#fff; }

    th, td { padding:15px; text-align:center; border-bottom:1px solid var(--border); font-size:.95rem; }
    tbody tr:hover { background:#f9fafb; }

    .badge { padding:7px 12px; border-radius:50px; font-size:.8rem; font-weight:700; display:inline-block; }
    .badge-unpaid { background:#ffe5e8; color:#b42318; }
    .badge-paid   { background:#d1fadf; color:#067647; }

    .btn-pay {
      background:var(--success);
      color:#fff;
      padding:10px 14px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-weight:600;
      transition:.2s;
    }
    .btn-pay:hover { background:var(--success-dark); }

    .empty-state { text-align:center; padding:50px 20px; color:var(--muted); font-size:1.1rem; }

    .footer-actions { margin-top:25px; display:flex; justify-content:center; }

    @media(max-width:768px){
      .topbar { flex-direction:column; align-items:flex-start; }
      .title-area h1 { font-size:1.6rem; }
      .summary-card .amount { font-size:1.6rem; }
      th, td { padding:12px; font-size:.85rem; }
    }
  </style>
</head>

<body>

<!-- Toggle Button -->
<button class="toggle-btn" onclick="toggleSidebar()" aria-label="Toggle menu">
  <i class="ti ti-menu-2"></i>
</button>

<!-- Sidebar (links injected by JS based on role) -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <i class="ti ti-package" aria-hidden="true"></i>
    <span class="sidebar-logo-text">Inventra</span>
  </div>
  <div class="sidebar-divider"></div>
  <div id="sidebarLinks"></div>
  <div class="sidebar-spacer"></div>
  <div class="sidebar-divider"></div>
  <a href="Home Stock.html" class="logout-link">
    <i class="ti ti-logout" aria-hidden="true"></i>
    <span class="nav-label">Logout</span>
  </a>
</div>

<!-- Main Content -->
<div class="main-content">
  <div class="container">

    <!-- HEADER -->
    <div class="topbar">
      <div class="title-area">
        <h1>📋 Outstanding Debts</h1>
        <p>Track unpaid balances and cleared debt records</p>
      </div>
      <div class="top-actions">
        <button class="btn btn-reset" onclick="resetSystem()">⚠ Reset System</button>
      </div>
    </div>

    <!-- SUMMARY -->
    <div class="summary-grid">
      <div class="card summary-card">
        <h3>Total Unpaid Debts</h3>
        <div class="amount danger-text" id="totalDebt">Ksh 0.00</div>
      </div>
      <div class="card summary-card">
        <h3>Total Cleared Debts</h3>
        <div class="amount success-text" id="totalCleared">Ksh 0.00</div>
      </div>
      <div class="card summary-card">
        <h3>Total Debtors</h3>
        <div class="amount" id="totalDebtors">0</div>
      </div>
    </div>

    <!-- SEARCH -->
    <div class="search-box">
      <input type="text" id="searchDebtor" placeholder="🔍 Search by debtor name..." oninput="renderDebts()"/>
    </div>

    <!-- TABLE -->
    <div class="table-card">
      <div class="table-wrapper">
        <div id="debtContainer"></div>
      </div>
    </div>

    <!-- FOOTER -->
    <div class="footer-actions">
      <a href="#" id="backBtn" class="btn btn-back">⬅ Back to Stock</a>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const supabaseUrl = "https://quhorqxtzhpuxeujgxfw.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1aG9ycXh0emhwdXhldWpneGZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNTI2NzgsImV4cCI6MjA5NTYyODY3OH0._bldtcFHB59obsAsxC7ctKn-EqoQqKnwLTXowo2ppF8";

const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

let allSales = [];

// ── Sidebar & role setup ──
const ADMIN_LINKS = [
  { href: "admin_dashboard.html", icon: "ti-home",          label: "Dashboard"    },
  { href: "Stock.html",           icon: "ti-box",           label: "Stock"        },
  { href: "Sell.html",            icon: "ti-shopping-cart", label: "Sell"         },
  { href: "debts.html",           icon: "ti-coin",          label: "Debts"        },
  { href: "sales_report.html",    icon: "ti-chart-bar",     label: "Reports"      },
  { href: "manage_user.html",     icon: "ti-users",         label: "Users"        },
];

const USER_LINKS = [
  { href: "user_dashboard.html",  icon: "ti-home",          label: "Dashboard"    },
  { href: "user_stock.html",      icon: "ti-box",           label: "View Stock"   },
  { href: "Sell.html",            icon: "ti-shopping-cart", label: "Sell Products"},
  { href: "sales_report.html",    icon: "ti-chart-bar",     label: "Sales Reports"},
  { href: "debts.html",           icon: "ti-coin",          label: "Debts"        },
];

function buildSidebar() {
  const user  = JSON.parse(localStorage.getItem("loggedInUser"));
  const links = user?.role === "Admin" ? ADMIN_LINKS : USER_LINKS;
  const container = document.getElementById("sidebarLinks");

  container.innerHTML = links.map(l => `
    <a href="${l.href}" ${l.href === window.location.pathname.split("/").pop() ? 'class="active-link"' : ''}>
      <i class="ti ${l.icon}" aria-hidden="true"></i>
      <span class="nav-label">${l.label}</span>
    </a>
  `).join("");

  // Set back button
  const backBtn = document.getElementById("backBtn");
  if (backBtn) {
    backBtn.href = user?.role === "Admin" ? "Stock.html" : "user_stock.html";
  }
}

function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("active");
}

// ── Load sales ──
async function loadSalesFromSupabase() {
  try {
    const { data, error } = await supabaseClient
      .from("sales")
      .select("*")
      .order("date", { ascending: false });

    if (error) throw error;

    allSales = data || [];
    localStorage.setItem("allSales", JSON.stringify(allSales));
    renderDebts();
    updateDebtTotals();
    console.log("✅ Sales loaded from Supabase");

  } catch (err) {
    console.error("Supabase load failed:", err);
    allSales = JSON.parse(localStorage.getItem("allSales")) || [];
    renderDebts();
    updateDebtTotals();
    console.log("📦 Loaded from local cache");
  }
}

// ── Render debts table ──
function renderDebts() {
  const searchValue = document.getElementById("searchDebtor")?.value.toLowerCase() || "";

  const debts = allSales.filter(s => {
    const hasDebt    = (parseFloat(s.balance) || 0) > 0;
    const wasCleared = s.status === "PAID" && s.clearedDate;
    const debtorName = (s.debtor || "").toLowerCase();
    return (hasDebt || wasCleared) && debtorName.includes(searchValue);
  });

  if (!debts.length) {
    document.getElementById("debtContainer").innerHTML = `<div class="empty-state">📭 No debts recorded.</div>`;
    return;
  }

  let html = `
    <table>
      <thead>
        <tr>
          <th>Product</th><th>Price Each</th><th>Qty</th><th>Total</th>
          <th>Balance</th><th>Payment</th><th>Debtor</th>
          <th>Sale Date</th><th>Status</th><th>Cleared Date</th><th>Action</th>
        </tr>
      </thead>
      <tbody>
  `;

  debts.forEach((d, index) => {
    const status = d.balance > 0 ? "PARTIAL" : "PAID";
    html += `
      <tr>
        <td>${d.product}</td>
        <td>Ksh ${Number(d.price || 0).toFixed(2)}</td>
        <td>${d.qty}</td>
        <td>Ksh ${Number(d.total || 0).toFixed(2)}</td>
        <td class="${(parseFloat(d.balance) || 0) > 0 ? 'danger-text' : 'success-text'}">
          <strong>Ksh ${Number(d.balance || 0).toFixed(2)}</strong>
        </td>
        <td>${d.payment}</td>
        <td>${d.debtor || "N/A"}</td>
        <td>${new Date(d.date).toLocaleDateString()} ${new Date(d.date).toLocaleTimeString()}</td>
        <td>
          ${status === "PARTIAL"
            ? `<span class="badge badge-unpaid">PARTIAL</span>`
            : `<span class="badge badge-paid">PAID</span>`}
        </td>
        <td>${d.clearedDate ? new Date(d.clearedDate).toLocaleString() : "-"}</td>
        <td>
          ${(parseFloat(d.balance) || 0) > 0
            ? `<button class="btn-pay" onclick="markAsPaid(${index})">Mark Paid</button>`
            : "-"}
        </td>
      </tr>
    `;
  });

  html += `</tbody></table>`;
  document.getElementById("debtContainer").innerHTML = html;
}

// ── Mark as paid ──
async function markAsPaid(index) {
  const searchValue = document.getElementById("searchDebtor")?.value.toLowerCase() || "";

  const debts = allSales.filter(s => {
    const hasDebt    = (parseFloat(s.balance) || 0) > 0;
    const wasCleared = s.status === "PAID" && s.clearedDate;
    const debtorName = (s.debtor || "").toLowerCase();
    return (hasDebt || wasCleared) && debtorName.includes(searchValue);
  });

  const sale = debts[index];
  if (!sale) return;

  const originalIndex = allSales.findIndex(s =>
    s.product === sale.product && s.date === sale.date && s.debtor === sale.debtor
  );
  if (originalIndex === -1) return;

  const currentSale      = allSales[originalIndex];
  const remainingBalance = parseFloat(currentSale.balance) || 0;

  if (remainingBalance <= 0) { alert("No outstanding balance."); return; }

  const paymentInput = prompt(`Outstanding balance is Ksh ${remainingBalance}\n\nEnter amount paid:`);
  if (paymentInput === null) return;

  const paymentAmount = parseFloat(paymentInput);
  if (isNaN(paymentAmount) || paymentAmount <= 0) { alert("Enter a valid payment amount."); return; }
  if (paymentAmount > remainingBalance)            { alert("Payment cannot exceed balance."); return; }

  const today    = new Date().toISOString().split("T")[0];
  const saleDate = new Date(currentSale.date).toISOString().split("T")[0];

  currentSale.amountPaid    = (parseFloat(currentSale.amountPaid) || 0) + paymentAmount;
  currentSale.balance       = remainingBalance - paymentAmount;
  currentSale.clearedAmount = (parseFloat(currentSale.clearedAmount) || 0) + paymentAmount;
  currentSale.clearedDate   = new Date().toISOString();
  currentSale.status        = currentSale.balance <= 0 ? "PAID" : "PARTIAL";
  if (currentSale.balance <= 0) currentSale.balance = 0;

  if (today !== saleDate) {
    const debtPayment = {
      receiptNo:   crypto.randomUUID(),
      originalReceiptNo: currentSale.receiptNo,
      product:     currentSale.product,
      customer:    currentSale.customer || currentSale.debtor || "N/A",
      debtor:      currentSale.debtor   || currentSale.customer || "N/A",
      qty:         0,
      total:       paymentAmount,
      amountPaid:  paymentAmount,
      balance:     0,
      payment:     "Debt Clearance",
      status:      "PAID",
      date:        new Date().toISOString(),
      clearedDate: new Date().toISOString()
    };
    allSales.unshift(debtPayment);
    if (navigator.onLine) {
      await supabaseClient.from("sales").insert([debtPayment]);
    }
  }

  localStorage.setItem("allSales", JSON.stringify(allSales));

  if (navigator.onLine) {
    const { error } = await supabaseClient
      .from("sales")
      .upsert([currentSale], { onConflict: "receiptNo" });
    if (error) console.error("Update failed:", error);
    else console.log("✅ Debt payment synced");
  }

  renderDebts();
  updateDebtTotals();

  alert(currentSale.balance > 0
    ? `✅ Partial payment recorded.\nRemaining balance: Ksh ${currentSale.balance}`
    : "✅ Debt fully cleared!"
  );
}

// ── Summary totals ──
function updateDebtTotals() {
  let totalDebt = 0, totalCleared = 0;
  const debtors = new Set();

  allSales.forEach(s => {
    const balance = parseFloat(s.balance) || 0;
    if (balance > 0) { totalDebt += balance; if (s.debtor) debtors.add(s.debtor); }
    totalCleared += parseFloat(s.clearedAmount) || 0;
  });

  document.getElementById("totalDebt").innerText     = `Ksh ${totalDebt.toFixed(2)}`;
  document.getElementById("totalCleared").innerText  = `Ksh ${totalCleared.toFixed(2)}`;
  document.getElementById("totalDebtors").innerText  = debtors.size;
}

// ── Reset system ──
function resetSystem() {
  if (!confirm("⚠ This will delete ALL data.\nAre you sure?")) return;
  if (prompt("Type DELETE to confirm:") !== "DELETE") { alert("❌ Reset cancelled."); return; }
  localStorage.removeItem("products");
  localStorage.removeItem("allSales");
  localStorage.removeItem("sellIndices");
  localStorage.removeItem("loggedInUser");
  alert("✅ System reset successful!");
  window.location.href = "Home Stock.html";
}

// ── Sync helpers ──
async function forceSyncAllSalesToSupabase() {
  let sales = JSON.parse(localStorage.getItem("allSales")) || [];
  if (!sales.length) return;
  const seen = new Set();
  const unique = sales.filter(s => { if (seen.has(s.receiptNo)) return false; seen.add(s.receiptNo); return true; });
  const { error } = await supabaseClient.from("sales").upsert(unique, { onConflict: "receiptNo" });
  if (error) console.error("Full Sync Error:", error);
  else console.log("✅ Full sync complete");
}

// ── Real-time ──
supabaseClient
  .channel("sales-live")
  .on("postgres_changes", { event: "*", schema: "public", table: "sales" }, () => loadSalesFromSupabase())
  .subscribe();

// ── Tab sync ──
window.addEventListener("storage", e => {
  if (e.key === "allSales") {
    allSales = JSON.parse(localStorage.getItem("allSales")) || [];
    renderDebts();
    updateDebtTotals();
  }
});

// ── Init ──
document.addEventListener("DOMContentLoaded", async () => {
  buildSidebar();
  await loadSalesFromSupabase();
  if (navigator.onLine) await forceSyncAllSalesToSupabase();
});

window.addEventListener("online", () => forceSyncAllSalesToSupabase());

</script>
</body>
</html>
