<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create User (Admin Only) - Inventra</title>
  <style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
  background:linear-gradient(135deg,#eef2ff,#dbeafe);
  min-height:100vh;
  padding:30px 15px;
  color:#333;
}

/* Dashboard Button */
.dashboard-btn{
  position:fixed;
  top:20px;
  left:20px;
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  color:#fff;
  padding:12px 20px;
  border-radius:12px;
  font-weight:600;
  text-decoration:none;
  box-shadow:0 4px 10px rgba(0,0,0,0.15);
  transition:0.3s;
  z-index:1000;
}

.dashboard-btn:hover{
  transform:translateY(-2px);
  background:linear-gradient(135deg,#1d4ed8,#1e40af);
}

/* Main Containers */
.container,
.user-list{
  background:#fff;
  border-radius:20px;
  padding:30px;
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
  margin:auto;
  margin-bottom:25px;
}

.container{
  max-width:450px;
}

.user-list{
  max-width:900px;
}

/* Headings */
h2{
  text-align:center;
  margin-bottom:25px;
  color:#1e3a8a;
  font-size:28px;
}

/* Form */
.form-group{
  margin-bottom:20px;
}

label{
  display:block;
  margin-bottom:8px;
  font-weight:600;
  color:#374151;
}

input,
select{
  width:100%;
  padding:14px;
  border:1px solid #d1d5db;
  border-radius:12px;
  font-size:15px;
  transition:0.3s;
  background:#f9fafb;
}

input:focus,
select:focus{
  border-color:#2563eb;
  outline:none;
  background:#fff;
  box-shadow:0 0 0 3px rgba(37,99,235,0.15);
}

/* Buttons */
.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  color:#fff;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 15px rgba(37,99,235,0.3);
}

/* Messages */
.msg{
  margin-bottom:20px;
  text-align:center;
  font-weight:bold;
  font-size:15px;
}

.error{
  color:#dc2626;
  font-size:14px;
  margin-top:5px;
  display:block;
}

/* Table */
table{
  width:100%;
  border-collapse:collapse;
  overflow:hidden;
  border-radius:12px;
}

th{
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  color:#fff;
  padding:15px;
  text-align:left;
  font-size:15px;
}

td{
  padding:14px;
  border-bottom:1px solid #e5e7eb;
  background:#fff;
}

tr:hover td{
  background:#f8fafc;
}

/* Action Buttons */
.action-btn{
  border:none;
  padding:8px 14px;
  border-radius:8px;
  color:#fff;
  font-size:14px;
  cursor:pointer;
  margin-right:5px;
  transition:0.3s;
}

.edit-btn{
  background:#16a34a;
}

.edit-btn:hover{
  background:#15803d;
}

.delete-btn{
  background:#dc2626;
}

.delete-btn:hover{
  background:#b91c1c;
}

/* Mobile Responsive */
@media(max-width:768px){

  body{
    padding:20px 10px;
  }

  .container,
  .user-list{
    padding:20px;
  }

  h2{
    font-size:22px;
  }

  table{
    font-size:14px;
  }

  th,td{
    padding:10px;
  }

  .dashboard-btn{
    padding:10px 16px;
    font-size:14px;
  }

}

</style>
</head>
<body>
  <a href="#" class="dashboard-btn" onclick="openAdminDashboard(event)">🏠 Dashboard</a>
<div class="container">
  <h2>Create New User</h2>

  <!-- Message display -->
  <div class="msg" id="msg"></div>

  <form id="createUserForm" onsubmit="return createUser(event)">
    <div class="form-group">
      <label for="email">Email:</label>
      <input type="email" id="email" required>
    </div>

    <div class="form-group">
      <label for="password">Password:</label>
      <input type="password" id="password" required>
    </div>

    <div class="form-group">
      <label for="confirm_password">Confirm Password:</label>
      <input type="password" id="confirm_password" required>
      <small id="errorMsg" class="error"></small>
    </div>

    <div class="form-group">
      <label for="role">Role:</label>
      <select id="role" required>
        <option value="User">User</option>
        <option value="Admin">Admin</option>
      </select>
    </div>

    <button type="submit" class="btn">Create User</button>
  </form>
</div>

<!-- ✅ List of created users -->
<div class="user-list">
  <h2>Existing Users</h2>
  <table id="userTable">
    <thead>
      <tr>
        <th>Email</th>
        <th>Role</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="userTableBody"></tbody>
  </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<script>
  
const supabaseUrl = "https://quhorqxtzhpuxeujgxfw.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1aG9ycXh0emhwdXhldWpneGZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNTI2NzgsImV4cCI6MjA5NTYyODY3OH0._bldtcFHB59obsAsxC7ctKn-EqoQqKnwLTXowo2ppF8";


const supabaseClient =
  window.supabase.createClient(
    supabaseUrl,
    supabaseKey
  );

  // ✅ Ensure only admins can access this page
  const currentUser = JSON.parse(localStorage.getItem('loggedInUser'));
if (!currentUser || currentUser.role !== 'Admin') {
  alert('❌ Unauthorized access! Only Admins can create users.');
  window.location.href = 'Home Stock.html';
}
// ✅ Function to render user list
  // ✅ Render user list
 function renderUsers() {
  const users =
    JSON.parse(localStorage.getItem("users")) || [];

  const tableBody =
    document.getElementById("userTableBody");

  tableBody.innerHTML = "";

  users.forEach((user, index) => {
    tableBody.innerHTML += `
      <tr>
        <td>${user.email}</td>
        <td>${user.role}</td>
        <td>
          <button
            class="action-btn edit-btn"
            onclick="editUser(${index})">
            Edit
          </button>

          <button
            class="action-btn delete-btn"
            onclick="deleteUser(${index})">
            Delete
          </button>
        </td>
      </tr>
    `;
  });
}
  // ✅ Create user in localStorage
  //function createUser(event) {
    async function createUser(event) {
event.preventDefault();

const email =
document.getElementById("email")
.value.trim()
.toLowerCase();

const password =
document.getElementById("password").value;

const confirmPass =
document.getElementById("confirm_password").value;

const role = String(document.getElementById("role").value);

const msg =
document.getElementById("msg");

const errorMsg =
document.getElementById("errorMsg");

if (password.length < 6) {
errorMsg.textContent =
"Password must be at least 6 characters.";
return false;
}

if (password !== confirmPass) {
errorMsg.textContent =
"Passwords do not match!";
return false;
}

errorMsg.textContent = "";

let users =
JSON.parse(
localStorage.getItem("users")
) || [];

if (
users.some(
u =>
u.email &&
u.email.toLowerCase() === email
)
) {
msg.style.color = "red";
msg.textContent =
"⚠️ Email already exists!";
return false;
}

const newUser = {

email,
password,
role
};

users.push(newUser);

localStorage.setItem(
"users",
JSON.stringify(users)
);

const { error } =
await supabaseClient
.from("users")
.upsert([newUser]);

if (error) {
console.error(error);
}

msg.style.color = "green";
msg.textContent =
"✅ User created successfully!";

document
.getElementById("createUserForm")
.reset();

renderUsers();

return false;
}

  // ✅ Edit user
  async function editUser(index) {
  const users =
    JSON.parse(localStorage.getItem("users")) || [];

  const user = users[index];

  const newEmail =
    prompt("Edit email:", user.email);

  const newPassword =
    prompt("Edit password:", user.password);

  const newRole =
    prompt("Edit role (Admin/User):", user.role);

  if (newEmail && newPassword && newRole) {

    users[index].email =
      newEmail.toLowerCase();

    users[index].password =
      newPassword;

    users[index].role =
      newRole;

    localStorage.setItem(
      "users",
      JSON.stringify(users)
    );

    const { error } =
      await supabaseClient
        .from("users")
        .upsert(users[index]);

    if (error) {
      console.error(error);
    }

    renderUsers();

    alert("✅ User updated successfully!");
  }
}

  // ✅ Delete user
  async function deleteUser(index) {

  if (!confirm("Delete this user?"))
    return;

  let users =
    JSON.parse(localStorage.getItem("users")) || [];

  const deletedUser =
    users[index];

  users.splice(index, 1);

  localStorage.setItem(
    "users",
    JSON.stringify(users)
  );

  const { error } =
    await supabaseClient
      .from("users")
      .delete()
      .eq("id", deletedUser.id);

  if (error) {
    console.error(error);
  }

  renderUsers();
}

  // ✅ Load users when page loads
  renderUsers();
  function openAdminDashboard(e) {
  e.preventDefault();
  window.location.href = "admin_dashboard.html";
}
  async function syncAllUsersToSupabase() {
const users =
JSON.parse(
localStorage.getItem("users")
) || [];

if (users.length === 0) return;

const { error } =
await supabaseClient
.from("users")
.upsert(users);

if (error) {
console.error(
"Supabase sync failed:",
error
);
} else {
console.log(
"✅ All local users synced"
);
}
}
async function loadUsersFromSupabase() {

  try {

    const { data, error } =
      await supabaseClient
        .from("users")
        .select("*")
        .order("id", { ascending: true });

    if (error) throw error;

    // Save Supabase data locally
    localStorage.setItem(
      "users",
      JSON.stringify(data || [])
    );

    console.log(
      "✅ Users loaded from Supabase"
    );

  } catch (err) {

    console.error(
      "❌ Failed to load users:",
      err
    );

  }

}

document.addEventListener(
  "DOMContentLoaded",
  async () => {

    // Load users from Supabase first
    await loadUsersFromSupabase();

    // Display them
    renderUsers();

    // Push any local changes back
    await syncAllUsersToSupabase();

  }
);
supabaseClient
  .channel("users-live")
  .on(
    "postgres_changes",
    {
      event: "*",
      schema: "public",
      table: "users"
    },
    async () => {

      await loadUsersFromSupabase();
      renderUsers();

    }
  )
  .subscribe();

</script>
</body>
</html>
